agent:
  server_url: "http://localhost:8080"
  register_path: "/api/v1/agents/register"
  # WebSocket 路径；与服务端 ws_url / 路由不一致时修改（握手失败请看日志里的 HTTP status 与 response_snippet）
  websocket_path: "/api/v1/agents/ws"
  data_dir: "./data"
  config_dir: "./data/config"
  # 二选一：控制台「添加节点」生成的 enrollment_token（推荐），或传统 install_token
  install_token: ""
  enrollment_token: ""
  node_name: "example-node"
  credential_dir: "./data/credentials"
  log_dir: "./data/logs"
  runtime_interval_seconds: 30
  heartbeat_interval_seconds: 15
  reconnect_interval_seconds: 5
  request_timeout_seconds: 10
  agent_version: "0.1.0"
  # 自更新（参考 nezhahq agent）：Release 资源名需匹配 *_<goos>_<goarch>.zip，如 nexctl_linux_amd64.zip
  disable_auto_update: false
  # 为 0 时随机 1440～2880 分钟检查一次（与 nezhahq 默认一致）
  self_update_period_minutes: 0
  github_repo: "nexctl/agent"
